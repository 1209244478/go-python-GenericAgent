<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GenericAgent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div id="mobileOverlay" onclick="closeMobileSidebar()"></div>

<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span>GenericAgent</span>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
        <svg id="themeIconDark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="themeIconLight" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-item-row">
        <a href="#" class="nav-item active" data-view="chat" onclick="switchView('chat',this)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          Agent
        </a>
        <button class="session-toggle" id="sessionToggle" onclick="toggleSessionList()" title="Toggle sessions">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
      <div class="session-section" id="sessionSection">
        <div class="session-list" id="sessionList"></div>
        <div class="session-new-btn" id="sessionNewBtn" onclick="showSessionInput()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>New Session</span>
        </div>
        <div class="session-new-input" id="sessionNewInput" style="display:none">
          <input type="text" id="sessionNameInput" placeholder="Session name" onkeydown="handleSessionInputKey(event)" />
          <button class="session-input-ok" onclick="confirmNewSession()" title="Confirm">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <button class="session-input-cancel" onclick="cancelNewSession()" title="Cancel">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <a href="#" class="nav-item" data-view="files" onclick="switchView('files',this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        Files
      </a>
      <a href="#" class="nav-item" data-view="skills" onclick="switchView('skills',this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Skills
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info" onclick="toggleUserMenu()">
        <div class="avatar" id="userAvatar"></div>
        <div class="user-detail">
          <span class="user-name" id="userName"></span>
          <span class="user-email" id="userEmail"></span>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="user-menu" id="userMenu">
        <button onclick="handleLogout()">Sign Out</button>
      </div>
    </div>
  </aside>

  <main id="main">
    <div id="view-chat" class="view active">
      <div class="chat-header">
        <div class="chat-title">
          <button id="mobileMenuBtn" onclick="openMobileSidebar()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h2>Agent</h2>
          <span class="status-badge" id="agentStatus">Ready</span>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <p>Describe your task and the agent will execute it autonomously.</p>
        </div>
      </div>
      <div class="chat-input-area">
        <div class="input-wrapper">
          <textarea id="chatInput" placeholder="Describe your task..." rows="1" onkeydown="handleInputKey(event)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div id="view-files" class="view">
      <div class="view-header">
        <button id="mobileMenuBtn" onclick="openMobileSidebar()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h2>My Files</h2>
        <button class="btn-sm" onclick="document.getElementById('uploadInput').click()">Upload</button>
        <input type="file" id="uploadInput" style="display:none" onchange="handleUpload(this)">
      </div>
      <div class="file-list" id="fileList">
        <div class="empty-state"><p>No files yet. Upload or let the agent create them.</p></div>
      </div>
    </div>

    <div id="view-skills" class="view">
      <div class="view-header">
        <button id="mobileMenuBtn" onclick="openMobileSidebar()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h2>Skills</h2>
        <span class="badge-readonly">Read Only</span>
      </div>
      <div class="skill-list" id="skillList">
        <div class="empty-state"><p>Loading skills...</p></div>
      </div>
    </div>
  </main>
</div>

<div id="previewModal" class="preview-modal" onclick="if(event.target===this)closePreview()">
  <div class="preview-content">
    <div class="preview-header">
      <h3 id="previewTitle">Preview</h3>
      <button class="preview-close" onclick="closePreview()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="previewBody" class="preview-body"></div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
